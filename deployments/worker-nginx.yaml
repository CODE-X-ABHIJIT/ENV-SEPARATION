apiVersion: apps/v1
kind: Deployment

metadata:
  name: worker-nginx
  namespace: dev

spec:
  replicas: 2

  selector:
    matchLabels:
      app: worker-nginx

  template:
    metadata:
      labels:
        app: worker-nginx

    spec:
      nodeSelector:
        node-type: worker

      containers:
      - name: nginx
        image: nginx