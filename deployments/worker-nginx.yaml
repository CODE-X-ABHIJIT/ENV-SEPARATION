apiVersion: apps/v1
kind: Deployment

metadata:
  name: worker-nginx
  namespace: uat

spec:
  replicas: 2

  selector:
    matchLabels:
      app: worker-nginx

  template:
    metadata:
      labels:
        app: worker-nginx

    spec:
      nodeSelector:
        env: uat
      tolerations:
      - key: "env"
        operator: "Equal"
        value: "uat"
        effect: "NoSchedule"

      containers:
      - name: nginx
        image: nginx